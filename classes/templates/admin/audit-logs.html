<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audit Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="h3 mb-0">Audit Logs</h1>
        <div class="d-flex align-items-center gap-2">
            <span class="small text-muted" sec:authorize="isAuthenticated()">
                Signed in: <strong sec:authentication="name">admin</strong>
            </span>
            <a class="btn btn-outline-secondary" th:href="@{/admin/users}" href="/admin/users">Users</a>
            <a class="btn btn-outline-secondary" th:href="@{/todo}" href="/todo">ToDo</a>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <form method="get" th:action="@{/admin/audit-logs}" class="row g-2 align-items-end">
                <div class="col-md-2">
                    <label class="form-label">Action</label>
                    <input class="form-control" type="text" name="action" th:value="${action}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Entity</label>
                    <input class="form-control" type="text" name="entityType" th:value="${entityType}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">User ID</label>
                    <input class="form-control" type="number" name="userId" th:value="${userId}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Keyword</label>
                    <input class="form-control" type="text" name="keyword" th:value="${keyword}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">From</label>
                    <input class="form-control" type="date" name="fromDate" th:value="${fromDate}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">To</label>
                    <input class="form-control" type="date" name="toDate" th:value="${toDate}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Limit</label>
                    <input class="form-control" type="number" min="1" max="500" name="limit" th:value="${limit}">
                </div>
                <div class="col-md-10 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Search</button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/audit-logs}" href="/admin/audit-logs">Reset</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-striped table-sm mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>At</th>
                    <th>Action</th>
                    <th>Entity</th>
                    <th>Entity ID</th>
                    <th>User ID</th>
                    <th>IP</th>
                    <th>Old Value</th>
                    <th>New Value</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(logs)}">
                    <td colspan="9" class="text-center text-muted py-4">No logs found.</td>
                </tr>
                <tr th:each="logItem : ${logs}">
                    <td th:text="${logItem.id}">1</td>
                    <td th:text="${logItem.createdAt != null ? #temporals.format(logItem.createdAt, 'yyyy-MM-dd HH:mm:ss') : '-'}">-</td>
                    <td th:text="${logItem.action}">TODO_UPDATE</td>
                    <td th:text="${logItem.entityType}">TODO</td>
                    <td th:text="${logItem.entityId}">1</td>
                    <td th:text="${logItem.userId}">1</td>
                    <td th:text="${logItem.ipAddress}">127.0.0.1</td>
                    <td style="max-width: 260px;">
                        <details th:if="${logItem.oldValue}">
                            <summary>View</summary>
                            <pre class="small mb-0" th:text="${logItem.oldValue}"></pre>
                        </details>
                    </td>
                    <td style="max-width: 260px;">
                        <details th:if="${logItem.newValue}">
                            <summary>View</summary>
                            <pre class="small mb-0" th:text="${logItem.newValue}"></pre>
                        </details>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
