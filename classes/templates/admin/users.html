<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{admin.users.title}">User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="h3 mb-0" th:text="#{admin.users.heading}">User Management</h1>
        <div class="d-flex align-items-center gap-2">
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/users(lang='ja')}" th:text="#{lang.ja}">日本語</a>
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/users(lang='en')}" th:text="#{lang.en}">English</a>
            <span class="small text-muted" sec:authorize="isAuthenticated()">
                <span th:text="#{todo.list.loggedInAs}">Signed in:</span> <strong sec:authentication="name">admin</strong>
            </span>
            <a class="btn btn-outline-dark" th:href="@{/admin/audit-logs}" href="/admin/audit-logs">Audit Logs</a>
            <a class="btn btn-outline-secondary" th:href="@{/todo}" href="/todo" th:text="#{admin.users.backTodo}">Back to ToDo</a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" role="alert">
        <span th:text="${successMessage}">Success</span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <span th:text="${errorMessage}">Error</span>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th th:text="#{login.username}">Username</th>
                    <th style="width: 140px;" th:text="#{admin.users.role}">Role</th>
                    <th style="width: 120px;" th:text="#{admin.users.status}">Status</th>
                    <th style="width: 220px;" th:text="#{admin.users.updatedAt}">Updated At</th>
                    <th style="width: 220px;" th:text="#{common.actions}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td th:text="${user.username}">admin</td>
                    <td th:text="${user.role}">ROLE_ADMIN</td>
                    <td>
                        <span th:if="${user.enabled}" class="badge bg-success" th:text="#{admin.users.enabled}">Enabled</span>
                        <span th:if="${!user.enabled}" class="badge bg-secondary" th:text="#{admin.users.disabled}">Disabled</span>
                    </td>
                    <td th:text="${user.updatedAt != null ? #temporals.format(user.updatedAt, 'yyyy-MM-dd HH:mm:ss') : '-'}">-</td>
                    <td class="d-flex gap-2">
                        <a class="btn btn-outline-primary btn-sm"
                           th:href="@{/admin/users/{id}/edit(id=${user.id})}" href="/admin/users/1/edit" th:text="#{common.edit}">Edit</a>
                        <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post"
                              onsubmit="return confirm('Delete this user and related todos?');">
                            <button type="submit" class="btn btn-outline-danger btn-sm" th:text="#{common.delete}">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
