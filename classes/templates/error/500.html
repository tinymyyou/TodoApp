<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{error.500.title}">500 Internal Server Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">
                    <h1 class="display-6 mb-3">500</h1>
                    <p class="lead mb-2" th:text="#{error.500.message}">An internal server error occurred.</p>
                    <p class="text-muted" th:text="${message}">Please try again later.</p>
                    <a class="btn btn-primary mt-3" th:href="@{/todo}" href="/todo" th:text="#{error.backToTodo}">Back to ToDo</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
