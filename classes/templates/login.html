<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{login.title}">Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-end mb-3 gap-2">
        <span class="text-muted small" th:text="#{common.language}">Language</span>
        <a th:href="@{/login(lang='ja')}" class="small" th:text="#{lang.ja}">日本語</a>
        <a th:href="@{/login(lang='en')}" class="small" th:text="#{lang.en}">English</a>
    </div>
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3 text-center" th:text="#{login.heading}">ToDo Login</h1>

                    <div th:if="${param.error}" class="alert alert-danger" role="alert">
                        <span th:text="#{login.error}">Invalid username or password.</span>
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success" role="alert">
                        <span th:text="#{login.logout}">Logged out successfully.</span>
                    </div>
                    <div th:if="${registeredMessage}" class="alert alert-success" role="alert" th:text="${registeredMessage}">
                        Registration completed.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="username" class="form-label" th:text="#{login.username}">Username</label>
                            <input id="username" name="username" type="text" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label" th:text="#{login.password}">Password</label>
                            <input id="password" name="password" type="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" th:text="#{login.submit}">Sign in</button>
                    </form>

                    <div class="text-center mt-3">
                        <a th:href="@{/register}" href="/register" th:text="#{login.registerLink}">Create a new account</a>
                    </div>
                </div>
            </div>
            <p class="text-muted small mt-3 mb-0 text-center" th:text="#{login.demoAdmin}">Demo admin: admin / admin123</p>
            <p class="text-muted small mt-1 text-center" th:text="#{login.demoUser}">Demo user: user / user123</p>
        </div>
    </div>
</div>
</body>
</html>
