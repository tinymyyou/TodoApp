<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Deadline Reminder</title>
</head>
<body style="font-family: sans-serif; color: #222;">
<h2>期限リマインダー</h2>
<p>
    <span th:text="${username}">user</span> さん、期限が近いToDoがあります。
</p>
<p>
    送信日: <span th:text="${today}">2026-03-25</span>
</p>
<table style="border-collapse: collapse; width: 100%;">
    <thead>
    <tr>
        <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">タイトル</th>
        <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">期限</th>
        <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">優先度</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="todo : ${todos}">
        <td style="border: 1px solid #ddd; padding: 8px;" th:text="${todo.title}">Todo</td>
        <td style="border: 1px solid #ddd; padding: 8px;" th:text="${todo.deadline}">2026-03-31</td>
        <td style="border: 1px solid #ddd; padding: 8px;" th:text="${todo.priority}">MEDIUM</td>
    </tr>
    </tbody>
</table>
</body>
</html>
