<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{todo.confirm.title}">登録内容の確認</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-end mb-2 gap-2">
        <span class="text-muted small" th:text="#{common.language}">Language</span>
        <a th:href="@{/todo/new(lang='ja')}" class="small" th:text="#{lang.ja}">日本語</a>
        <a th:href="@{/todo/new(lang='en')}" class="small" th:text="#{lang.en}">English</a>
    </div>
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="h3 mb-0" th:text="#{todo.confirm.heading}">登録内容の確認</h1>
    </div>

    <form th:action="@{/todo/complete}" action="/todo/complete" method="post">
        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <h2 class="h6 text-muted mb-2" th:text="#{todo.form.label.title}">タイトル</h2>
                <input type="text" class="form-control" th:value="${title}" value="サンプルタスク" readonly>
                <input type="hidden" name="title" th:value="${title}">

                <h2 class="h6 text-muted mt-3 mb-2" th:text="#{todo.form.label.priority}">優先度</h2>
                <input type="text" class="form-control" th:value="${#messages.msg('priority.' + priority.name())}" value="中" readonly>
                <input type="hidden" name="priority" th:value="${priority}">

                <h2 class="h6 text-muted mt-3 mb-2" th:text="#{todo.form.label.category}">カテゴリ</h2>
                <input type="text" class="form-control"
                       th:value="${category != null ? category.name : #messages.msg('common.notSelected')}"
                       value="未選択" readonly>
                <input type="hidden" name="categoryId" th:value="${categoryId}">

                <h2 class="h6 text-muted mt-3 mb-2" th:text="#{todo.form.label.deadline}">期限日</h2>
                <input type="text" class="form-control"
                       th:value="${deadline != null ? #temporals.format(deadline, 'yyyy-MM-dd') : #messages.msg('common.notSet')}"
                       value="未設定" readonly>
                <input type="hidden" name="deadline" th:value="${deadline}">
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-secondary" onclick="history.back()" th:text="#{common.back}">戻る</button>
            <button type="submit" class="btn btn-primary" th:text="#{todo.confirm.submit}">登録</button>
        </div>
    </form>
</div>
</body>
</html>
