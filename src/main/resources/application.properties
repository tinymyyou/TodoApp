# H2 Database settings
spring.datasource.url=jdbc:h2:mem:tododb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Initialize schema
spring.sql.init.mode=always

# MyBatis settings
mybatis.mapper-locations=classpath*:mapper/*.xml
mybatis.type-aliases-package=com.example.todo.model
mybatis.configuration.map-underscore-to-camel-case=true

# Multipart upload settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# File storage
app.file.upload-dir=uploads

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:${spring.mail.username}}

# Reminder scheduler
app.reminder.cron=0 0 9 * * *
app.reminder.zone=Asia/Tokyo
app.reminder.days-ahead=3
