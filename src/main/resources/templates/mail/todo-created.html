<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ToDo Created</title>
</head>
<body style="font-family: sans-serif; color: #222;">
<h2>ToDo created</h2>
<p>
    <span th:text="${username}">user</span> さんのToDoが作成されました。
</p>
<p>
    タイトル:
    <strong th:text="${todoTitle}">Sample ToDo</strong>
</p>
<p>
    期限:
    <strong th:text="${deadline != null ? deadline : 'N/A'}">N/A</strong>
</p>
</body>
</html>
