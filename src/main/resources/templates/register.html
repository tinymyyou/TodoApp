<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{register.title}">Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-end mb-3 gap-2">
        <span class="text-muted small" th:text="#{common.language}">Language</span>
        <a th:href="@{/register(lang='ja')}" class="small" th:text="#{lang.ja}">日本語</a>
        <a th:href="@{/register(lang='en')}" class="small" th:text="#{lang.en}">English</a>
    </div>
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3 text-center" th:text="#{register.heading}">User Registration</h1>

                    <form th:action="@{/register}" th:object="${registerForm}" method="post" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="username" class="form-label" th:text="#{login.username}">Username</label>
                            <input id="username" type="text" th:field="*{username}" class="form-control" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Username error</div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label" th:text="#{login.password}">Password</label>
                            <input id="password" type="password" th:field="*{password}" class="form-control" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password error</div>
                        </div>

                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label" th:text="#{register.confirmPassword}">Confirm Password</label>
                            <input id="confirmPassword" type="password" th:field="*{confirmPassword}" class="form-control" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">Confirmation error</div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100" th:text="#{register.submit}">Register</button>
                    </form>

                    <div class="text-center mt-3">
                        <a th:href="@{/login}" href="/login" th:text="#{register.backToLogin}">Back to login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
