<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{todo.edit.title}">ToDo編集</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-end mb-2 gap-2">
        <span class="text-muted small" th:text="#{common.language}">Language</span>
        <a th:href="@{/todo/{id}/edit(id=${todo.id}, lang='ja')}" class="small" th:text="#{lang.ja}">日本語</a>
        <a th:href="@{/todo/{id}/edit(id=${todo.id}, lang='en')}" class="small" th:text="#{lang.en}">English</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" role="alert">
        <span th:text="${successMessage}">updated.</span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <span th:text="${errorMessage}">error.</span>
    </div>

    <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="h3 mb-0" th:text="#{todo.edit.heading}">ToDo編集</h1>
        <a class="btn btn-outline-secondary" href="/todo" th:text="#{common.back}">戻る</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/todo/{id}/update(id=${todo.id})}" action="/todo/1/update" method="post">
                <div class="mb-3">
                    <label for="title" class="form-label" th:text="#{todo.form.label.title}">タイトル</label>
                    <input type="text" id="title" name="title" class="form-control"
                           th:value="${todo.title}" value="Sample task">
                </div>
                <div class="mb-3">
                    <label for="priority" class="form-label" th:text="#{todo.form.label.priority}">優先度</label>
                    <select id="priority" name="priority" class="form-select">
                        <option th:each="p : ${T(com.example.todo.model.Priority).values()}"
                                th:value="${p}"
                                th:text="${#messages.msg('priority.' + p.name())}"
                                th:selected="${p == todo.priority}">
                            Medium
                        </option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="categoryId" class="form-label" th:text="#{todo.form.label.category}">カテゴリ</label>
                    <select id="categoryId" name="categoryId" class="form-select">
                        <option value="" th:selected="${todo.categoryId == null}" th:text="#{common.notSelected}">未選択</option>
                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.name}"
                                th:selected="${category.id == todo.categoryId}">
                            Category
                        </option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="deadline" class="form-label" th:text="#{todo.form.label.deadline}">期限日</label>
                    <input type="date" id="deadline" name="deadline" class="form-control"
                           th:value="${todo.deadline}">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary" th:text="#{todo.edit.submit}">更新</button>
                    <a class="btn btn-outline-secondary" href="/todo" th:text="#{common.back}">戻る</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm mt-3">
        <div class="card-header" th:text="#{todo.edit.attachments}">添付ファイル</div>
        <div class="card-body">
            <form th:action="@{/todo/{id}/attachments(id=${todo.id})}"
                  action="/todo/1/attachments"
                  method="post"
                  enctype="multipart/form-data"
                  class="row g-2 align-items-center mb-3">
                <div class="col-12 col-md">
                    <input type="file" name="file" class="form-control" required>
                </div>
                <div class="col-12 col-md-auto">
                    <button type="submit" class="btn btn-primary" th:text="#{todo.edit.upload}">アップロード</button>
                </div>
            </form>

            <div class="table-responsive">
                <table class="table table-sm align-middle mb-0">
                    <thead>
                    <tr>
                        <th th:text="#{todo.edit.attachment.filename}">ファイル名</th>
                        <th style="width: 140px;" th:text="#{todo.edit.attachment.size}">サイズ</th>
                        <th style="width: 200px;" th:text="#{todo.edit.attachment.uploadedAt}">アップロード日時</th>
                        <th style="width: 180px;" th:text="#{common.actions}">操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(attachments)}">
                        <td colspan="4" class="text-muted" th:text="#{todo.edit.attachment.empty}">添付ファイルはありません。</td>
                    </tr>
                    <tr th:each="attachment : ${attachments}">
                        <td th:text="${attachment.originalFilename}">sample.txt</td>
                        <td th:text="${attachment.fileSize + ' bytes'}">0 bytes</td>
                        <td th:text="${#temporals.format(attachment.uploadedAt, 'yyyy-MM-dd HH:mm:ss')}">2026-01-01 12:00:00</td>
                        <td>
                            <a class="btn btn-outline-secondary btn-sm"
                               th:href="@{/todo/attachments/{attachmentId}/download(attachmentId=${attachment.id})}"
                               th:text="#{common.download}">
                                ダウンロード
                            </a>
                            <form th:action="@{/todo/attachments/{attachmentId}/delete(attachmentId=${attachment.id})}"
                                  method="post"
                                  class="d-inline"
                                  onsubmit="return confirm('Delete this attachment?')">
                                <button type="submit" class="btn btn-outline-danger btn-sm" th:text="#{common.delete}">削除</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
